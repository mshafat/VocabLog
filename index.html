<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabLog - Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <div id="app" class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-black text-indigo-600 tracking-tight">VocabLog</h1>
            <div class="space-x-3">
                <button onclick="showSection('learned')" class="text-sm font-medium text-slate-500">Learned</button>
                <button onclick="toggleSettings()" class="text-xl">⚙️</button>
            </div>
        </header>

        <!-- Settings Section -->
        <div id="settings-view" class="hidden bg-white p-5 rounded-2xl shadow-xl mb-6 border border-slate-200">
            <h2 class="font-bold text-lg mb-4 text-slate-700">App Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase">I am learning:</label>
                    <select id="learn-lang" class="w-full p-3 bg-slate-50 border-none rounded-xl mt-1 focus:ring-2 focus:ring-indigo-500"></select>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase">Translate to:</label>
                    <select id="target-lang" class="w-full p-3 bg-slate-50 border-none rounded-xl mt-1 focus:ring-2 focus:ring-indigo-500"></select>
                </div>
            </div>
            <button onclick="toggleSettings()" class="mt-6 w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-200">Save Changes</button>
        </div>

        <!-- Input Section -->
        <div id="input-view" class="space-y-4">
            <textarea id="note-input" class="w-full p-5 h-48 bg-white border border-slate-200 rounded-3xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg" placeholder="Type your sentence and **bold** the word you want to learn..."></textarea>
            
            <button onclick="saveNote()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-indigo-700 active:scale-[0.98] transition-all">Add to Log</button>
            
            <div class="pt-4">
                <p class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Repeat Session</p>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="startRepeat('today')" class="bg-white py-4 text-sm rounded-2xl shadow-sm border border-slate-100 font-bold hover:border-indigo-200 transition">Today</button>
                    <button onclick="startRepeat('week')" class="bg-white py-4 text-sm rounded-2xl shadow-sm border border-slate-100 font-bold hover:border-indigo-200 transition">Week</button>
                    <button onclick="startRepeat('all')" class="bg-white py-4 text-sm rounded-2xl shadow-sm border border-slate-100 font-bold hover:border-indigo-200 transition">All Time</button>
                </div>
            </div>
        </div>

        <!-- Repeat Section -->
        <div id="repeat-view" class="hidden">
            <div id="card-progress" class="text-center mb-6 text-slate-400 font-bold tracking-tighter text-sm uppercase">0 / 0</div>
            
            <div id="flashcard" onclick="flipCard()" class="h-96 w-full bg-white rounded-[2rem] flex flex-col items-center justify-center p-10 cursor-pointer shadow-2xl shadow-indigo-100 relative transition-all duration-500 border border-slate-100 overflow-hidden">
                <div id="card-content" class="text-3xl font-bold text-slate-800 text-center leading-snug"></div>
                <div class="absolute bottom-6 text-slate-300 text-[10px] font-black uppercase tracking-[0.2em]">Tap to flip</div>
            </div>

            <div class="mt-8 flex flex-col gap-4">
                <button onclick="markAsLearned()" class="w-full bg-emerald-50 text-emerald-600 py-3 rounded-2xl font-bold border border-emerald-100 hover:bg-emerald-100">✓ Already Learned</button>
                <div class="flex justify-between items-center px-2">
                    <button onclick="showSection('input')" class="text-slate-400 font-bold text-sm">Exit Session</button>
                    <button id="next-btn" onclick="nextCard()" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">Next Card</button>
                </div>
            </div>
        </div>

        <!-- Already Learned Section -->
        <div id="learned-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Mastered Words</h2>
                <button onclick="showSection('input')" class="text-indigo-600 font-bold text-sm">Back</button>
            </div>
            <div id="learned-list" class="space-y-3">
                <!-- Learned cards will appear here -->
            </div>
        </div>
    </div>

    <!-- Dictionary Popup -->
    <div id="dict-modal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center p-6 backdrop-blur-md z-50">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl transform transition-all">
            <h3 id="dict-word" class="text-2xl font-black text-indigo-600 mb-2 truncate"></h3>
            <div class="h-1 w-10 bg-indigo-100 rounded-full mb-4"></div>
            <p id="dict-meaning" class="text-slate-600 text-lg leading-relaxed"></p>
            <button onclick="closeModal()" class="mt-8 w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Got it</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
