<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabLog v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .rtl-auto { unicode-bidi: plaintext; text-align: start; }
        .vocab-word { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans min-h-screen text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <div id="app" class="max-w-md mx-auto p-4 pb-10">
        <header class="flex justify-between items-center py-6">
            <h1 onclick="showSection('input')" class="text-2xl font-black text-indigo-600 cursor-pointer select-none">
                VocabLog <span class="text-[10px] bg-indigo-100 dark:bg-indigo-900 px-2 py-0.5 rounded ml-1">v1.5</span>
            </h1>
            <div class="flex items-center space-x-4">
                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="text-xl bg-white dark:bg-slate-800 w-10 h-10 rounded-full shadow-sm flex items-center justify-center border border-slate-200 dark:border-slate-700 active:scale-90 transition-transform">
                    <span id="theme-icon">🌙</span>
                </button>
                <button onclick="showSection('learned')" class="text-sm font-bold text-slate-500">Learned</button>
                <button onclick="toggleSettings()" class="text-xl">⚙️</button>
            </div>
        </header>

        <!-- Input View -->
        <div id="input-view" class="space-y-4">
            <div class="relative">
                <button id="bold-tool" onclick="makeBold()" class="hidden absolute -top-12 left-0 bg-indigo-600 text-white text-xs px-4 py-2 rounded-full shadow-lg z-20 font-bold">
                    ✨ Highlight Word
                </button>
                <div id="note-input" contenteditable="true" onselect="handleSelection()" onmouseup="handleSelection()" class="w-full p-6 min-h-[220px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] shadow-sm outline-none focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/30 transition-all text-xl leading-relaxed overflow-y-auto rtl-auto" placeholder="Paste or type text here..."></div>
            </div>
            <button onclick="saveNote()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Save Card</button>
            
            <div class="pt-6 grid grid-cols-3 gap-3">
                <button onclick="startRepeat('today')" class="bg-white dark:bg-slate-900 py-4 text-xs rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 font-bold">Today</button>
                <button onclick="startRepeat('week')" class="bg-white dark:bg-slate-900 py-4 text-xs rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 font-bold">Week</button>
                <button onclick="startRepeat('all')" class="bg-white dark:bg-slate-900 py-4 text-xs rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 font-bold">All</button>
            </div>
        </div>

        <!-- Repeat View -->
        <div id="repeat-view" class="hidden">
            <div class="flex justify-between items-center mb-6 px-2">
                <div id="card-progress" class="text-slate-400 font-bold text-xs">0 / 0</div>
                <button onclick="deleteCurrentCard()" class="text-red-400 font-bold text-[10px] uppercase">🗑 Delete</button>
            </div>
            <div id="flashcard" onclick="flipCard()" class="h-96 w-full bg-white dark:bg-slate-900 rounded-[2.5rem] flex flex-col items-center justify-center p-8 cursor-pointer shadow-2xl relative border border-slate-100 dark:border-slate-800 overflow-hidden active:scale-95 transition-transform">
                <div id="card-content" class="text-center leading-relaxed w-full rtl-auto"></div>
                <div class="absolute bottom-6 text-slate-300 dark:text-slate-600 text-[9px] font-black uppercase tracking-[0.3em]">Tap to flip</div>
            </div>
            <div class="mt-8 space-y-6">
                <div class="flex justify-between items-center px-2">
                    <button onclick="prevCard()" id="prev-btn" class="text-indigo-600 font-bold text-sm disabled:opacity-30">← Previous</button>
                    <button id="next-btn" onclick="nextCard()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg">Next →</button>
                </div>
                <div class="flex justify-center pt-2">
                    <button id="master-btn" onclick="markAsLearned()" class="text-emerald-500 font-bold text-xs uppercase tracking-widest border-b border-emerald-200 dark:border-emerald-900 pb-0.5">✓ Mastered</button>
                </div>
            </div>
        </div>

        <!-- Mastered List View -->
        <div id="learned-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Mastered Words</h2>
                <button onclick="showSection('input')" class="text-indigo-600 font-bold text-sm">Home</button>
            </div>
            <!-- Mastered Review Button -->
            <button onclick="startRepeat('mastered')" class="w-full bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 py-4 rounded-2xl font-bold mb-6 border border-indigo-100 dark:border-indigo-800/50 shadow-sm active:scale-95 transition-all">
                🔄 Review Mastered Cards
            </button>
            <div id="learned-list" class="space-y-3"></div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="hidden bg-white dark:bg-slate-900 p-5 rounded-2xl shadow-xl mb-6 border border-slate-200 dark:border-slate-800">
            <h2 class="font-bold text-lg mb-4 text-center">Settings</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select id="learn-lang" class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl text-sm border-none"></select>
                    <select id="target-lang" class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl text-sm border-none"></select>
                </div>
                <button onclick="exportData()" class="w-full bg-slate-100 dark:bg-slate-800 py-3 rounded-xl text-sm font-bold">📤 Export Backup</button>
                <label class="w-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 py-3 rounded-xl text-sm font-bold text-center block cursor-pointer">
                    📥 Import Backup
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
            </div>
            <button onclick="toggleSettings()" class="mt-4 w-full text-slate-400 text-xs">Close</button>
        </div>
    </div>

    <!-- Dictionary Modal -->
    <div id="dict-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-6 backdrop-blur-sm z-50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] w-full max-w-xs shadow-2xl">
            <h3 id="dict-word" class="text-2xl font-black text-indigo-600 mb-2 uppercase"></h3>
            <p id="dict-meaning" class="text-slate-600 dark:text-slate-400 text-lg"></p>
            <button onclick="closeModal()" class="mt-8 w-full bg-slate-100 dark:bg-slate-800 py-3 rounded-xl font-bold">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
