<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabLog v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <div id="app" class="max-w-md mx-auto p-4 pb-10">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-black text-indigo-600">VocabLog <span class="text-[10px] bg-indigo-100 px-2 py-0.5 rounded ml-1">v1.1</span></h1>
            <div class="space-x-3">
                <button onclick="showSection('learned')" class="text-sm font-medium text-slate-500">Learned</button>
                <button onclick="toggleSettings()" class="text-xl">⚙️</button>
            </div>
        </header>

        <!-- Input View -->
        <div id="input-view" class="space-y-4">
            <div class="relative">
                <!-- Floating Bold Tool -->
                <button id="bold-tool" onclick="makeBold()" class="hidden absolute -top-10 left-0 bg-slate-800 text-white text-xs px-3 py-2 rounded-lg shadow-lg z-10 font-bold">
                    Bold Selected
                </button>
                <textarea id="note-input" onselect="handleSelection()" class="w-full p-5 h-48 bg-white border border-slate-200 rounded-3xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg" placeholder="Paste your sentence here..."></textarea>
            </div>
            
            <button onclick="saveNote()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Add to Log</button>
            
            <!-- Quick Selection Buttons -->
            <div class="pt-6 grid grid-cols-3 gap-3">
                <button onclick="startRepeat('today')" class="bg-white py-4 text-xs rounded-2xl shadow-sm border font-bold uppercase tracking-widest hover:border-indigo-200 transition">Today</button>
                <button onclick="startRepeat('week')" class="bg-white py-4 text-xs rounded-2xl shadow-sm border font-bold uppercase tracking-widest hover:border-indigo-200 transition">Week</button>
                <button onclick="startRepeat('all')" class="bg-white py-4 text-xs rounded-2xl shadow-sm border font-bold uppercase tracking-widest hover:border-indigo-200 transition">All</button>
            </div>
        </div>

        <!-- Repeat/Flashcard View -->
        <div id="repeat-view" class="hidden">
            <div class="flex justify-between items-center mb-6 px-2">
                <div id="card-progress" class="text-slate-400 font-bold text-xs uppercase tracking-widest">0 / 0</div>
                <button onclick="deleteCurrentCard()" class="text-red-400 font-bold text-xs uppercase">🗑 Delete</button>
            </div>
            
            <div id="flashcard" onclick="flipCard()" class="h-96 w-full bg-white rounded-[2.5rem] flex flex-col items-center justify-center p-8 cursor-pointer shadow-2xl relative transition-all duration-300 border border-slate-100 overflow-hidden">
                <div id="card-content" class="text-center leading-relaxed"></div>
                <div class="absolute bottom-6 text-slate-300 text-[9px] font-black uppercase tracking-[0.3em]">Tap to flip</div>
            </div>

            <div class="mt-8 space-y-4">
                <button onclick="markAsLearned()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition">Mastered ✓</button>
                <div class="flex justify-between items-center px-4">
                    <button onclick="showSection('input')" class="text-slate-400 font-bold text-sm">Exit</button>
                    <button id="next-btn" onclick="nextCard()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg">Next →</button>
                </div>
            </div>
        </div>

        <!-- Settings & Learned sections remain the same (reuse from v1.0) -->
        <!-- ... (Add v1.0 Settings/Learned/Dict Modal Code here) ... -->
    </div>

    <script src="script.js"></script>
</body>
</html>
