<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <div id="app" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-bold text-indigo-600">VocabLog</h1>
            <button onclick="toggleSettings()" class="text-gray-500">⚙️ Settings</button>
        </header>

        <!-- Settings Section -->
        <div id="settings-view" class="hidden bg-white p-4 rounded-xl shadow-inner mb-4 border border-gray-200">
            <h2 class="font-bold mb-2">অনুবাদ সেটিংস</h2>
            <label class="text-xs text-gray-500">আমি শিখছি (Input Language):</label>
            <select id="learn-lang" class="w-full p-2 border rounded mb-3">
                <option value="ur">Urdu (اردو)</option>
                <option value="en" selected>English</option>
                <option value="ar">Arabic</option>
            </select>
            <label class="text-xs text-gray-500">অর্থ দেখাবে (Target Language):</label>
            <select id="target-lang" class="w-full p-2 border rounded">
                <option value="bn" selected>Bengali (বাংলা)</option>
                <option value="en">English</option>
            </select>
            <button onclick="toggleSettings()" class="mt-3 w-full bg-indigo-100 text-indigo-700 py-1 rounded">Save & Close</button>
        </div>

        <!-- Input Section -->
        <div id="input-view" class="space-y-4">
            <textarea id="note-input" class="w-full p-4 h-40 border rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-400" placeholder="বাক্য লিখুন এবং শব্দটিকে **bold** করুন..."></textarea>
            <button onclick="saveNote()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition">Save to Log</button>
            
            <div class="grid grid-cols-3 gap-2 mt-4">
                <button onclick="startRepeat('today')" class="bg-white py-3 text-sm rounded-xl shadow-sm border border-gray-100 font-medium">Today</button>
                <button onclick="startRepeat('week')" class="bg-white py-3 text-sm rounded-xl shadow-sm border border-gray-100 font-medium">Week</button>
                <button onclick="startRepeat('all')" class="bg-white py-3 text-sm rounded-xl shadow-sm border border-gray-100 font-medium">All</button>
            </div>
        </div>

        <!-- Repeat Section -->
        <div id="repeat-view" class="hidden text-center">
            <div id="card-progress" class="mb-4 text-gray-400 text-sm">0 / 0</div>
            <div id="flashcard" onclick="flipCard()" class="h-80 w-full bg-white border-b-4 border-indigo-200 rounded-3xl flex items-center justify-center p-8 cursor-pointer shadow-xl relative active:scale-95 transition-transform">
                <div id="card-content" class="text-2xl font-semibold text-gray-800 leading-relaxed"></div>
                <div class="absolute bottom-4 text-gray-300 text-xs uppercase tracking-widest">Tap to Flip</div>
            </div>
            <div class="flex justify-between mt-10">
                <button onclick="exitRepeat()" class="text-gray-400 font-medium">Exit</button>
                <button onclick="nextCard()" id="next-btn" class="bg-indigo-600 text-white px-10 py-3 rounded-2xl shadow-lg font-bold">Next →</button>
            </div>
        </div>
    </div>

    <!-- Dictionary Modal -->
    <div id="dict-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl">
            <h3 id="dict-word" class="text-2xl font-bold text-indigo-600 mb-2"></h3>
            <div class="h-px bg-gray-100 mb-4"></div>
            <p id="dict-meaning" class="text-gray-700 leading-relaxed"></p>
            <button onclick="closeModal()" class="mt-8 bg-gray-100 text-gray-600 py-2 w-full rounded-xl font-bold">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
